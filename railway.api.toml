# railway.api.toml — config del servicio API de FerreBot SaaS (alineado con docs/DEPLOY-RAILWAY-PILOT.md).
#
# Úsalo SOLO en el servicio API: Railway → servicio API → Settings → Config-as-Code → "Config Path" =
# railway.api.toml. El WORKER se queda con railway.toml (sin migraciones). Así el pre-deploy de
# migraciones corre en UN SOLO servicio → sin carreras.
#
# Sin secretos horneados: las URLs del control DB y de los tenants se leen de las variables de entorno
# (CONTROL_DATABASE_URL, TENANTS_DIRECT_URL_BASE, SECRETS_MASTER_KEY) que defines en Railway.
#
# ── Pre-deploy: migraciones EN ORDEN, idempotentes ───────────────────────────
# Corre antes de poner en vivo la versión nueva: 1) control DB (Alembic) → 2) tenants (runner). El
# runner aplica `upgrade head` a cada app DB; con 0 tenants es no-op, así que es seguro desde el 1er
# deploy. Re-ejecutar no daña (alembic queda en head; el runner es idempotente).
#
# POR QUÉ `sh -c '...'` (no quitar): docker-entrypoint.sh hace el passthrough con `exec "$@"`, que
# ejecuta los argumentos DIRECTAMENTE (execve), SIN un shell de por medio. Los operadores de shell
# (`&&`, `|`, `;`) solo los interpreta un shell, así que el comando encadenado DEBE envolverse en
# `sh -c '...'`. Sin el `sh -c`, el `&&` y lo que le sigue (`python -m tools.migrate_tenants`) se
# pasaban como argumentos LITERALES de `alembic` (que los ignora): la migración de CONTROL corría pero
# el runner de TENANTS nunca → los tenants se quedaban sin migrar (confirmado en prod: en los logs del
# pre-deploy solo aparecía el alembic de control, jamás migrate_tenants). El arranque normal del API
# corre SIN args → sigue cayendo en SERVICE_TYPE=api (uvicorn).

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
preDeployCommand = "sh -c 'alembic -c migrations/control/alembic.ini upgrade head && python -m tools.migrate_tenants'"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
numReplicas = 1
