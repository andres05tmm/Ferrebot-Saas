name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  # Todo paquete Python top-level debe tener COPY en el Dockerfile: CI corre con el repo entero en
  # PYTHONPATH y no ve el hueco; prod sí (ModuleNotFoundError de `services/` tras el PR #77).
  dockerfile-copy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Paquetes top-level vs COPYs del Dockerfile
        run: python3 tools/ci/check_dockerfile_copy.py

  # El frontend nunca corría en CI: los tests del handoff/gating existían pero nadie los verificaba
  # en PR (el flujo login→handoff rompió 3 veces con "CI en verde"). Node 20 espeja node:20-slim
  # del Dockerfile. Incluye el test de contrato landing↔dashboard (handoff.contract.test.js).
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            dashboard/package-lock.json
            landing/package-lock.json
      - name: Dashboard - deps + tests + build
        working-directory: dashboard
        run: |
          npm ci
          npm run test
          npm run build
      - name: Landing - deps + tests + build
        working-directory: landing
        run: |
          npm ci
          npm run test
          npm run build

  test:
    runs-on: ubuntu-latest
    # La suite completa son ~784 tests que crean BD efímeras + migran (alembic) por test: ~12 min en
    # local, ~15-20 en el runner. 30 min acota un cuelgue real sin matar un run legítimo.
    timeout-minutes: 30

    # Réplica de los contenedores locales (ferrebot-pg / ferrebot-redis) que dejan la suite en verde.
    # Postgres en la MISMA major que prod (18); Redis 7. Health checks para no arrancar pytest antes
    # de que los servicios acepten conexiones.
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Salida sin buffer: dots/progreso en vivo en el log de Actions (distingue cuelgue de lentitud).
      PYTHONUNBUFFERED: "1"
      # El usuario `postgres` por defecto es SUPERUSUARIO → habilita el CREATE DATABASE que hacen las
      # fixtures de provisioning (control DB y app DB de tenant efímeras, creadas y migradas por test).
      ADMIN_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
      # Base de CONTROL: las fixtures rutean cada test a un control DB efímero (no necesita preexistir).
      CONTROL_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/control
      # Base SIN /db: se compone {base}/ferrebot_<slug> y {base}/test_tenant_<rnd> por test.
      TENANTS_DIRECT_URL_BASE: postgresql://postgres:postgres@localhost:5432
      REDIS_URL: redis://localhost:6379/0
      # CLAVE THROWAWAY solo-CI (NO un secreto real): las fixtures cifran/descifran con esta master key.
      SECRETS_MASTER_KEY: ci-throwaway-master-key-not-a-secret
      SECRET_KEY: ci-throwaway-jwt-key
      # Claves de proveedores externos vacías: los tests fakean LLM/Kapso/red (ninguna real hace falta).
      ANTHROPIC_API_KEY: ""
      OPENAI_API_KEY: ""
      KAPSO_API_KEY: ""
      KAPSO_WEBHOOK_SECRET: ""

    steps:
      - uses: actions/checkout@v4

      - name: Instalar uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      # pytest/pytest-asyncio/anyio viven en el extra `dev` (no se instalan por defecto).
      - name: Instalar dependencias
        run: uv sync --extra dev

      # Señal crítica primero: precisión de la llamada a herramienta + aislamiento multi-tenant del
      # agente (tests/evals/). Son rápidos (los deterministas no tocan BD); fallan el job temprano si
      # se rompe el corazón del producto, antes de gastar ~15 min en la suite completa.
      - name: Evals del agente (function-call + aislamiento)
        run: uv run pytest -m eval -ra --timeout=180 --timeout-method=thread

      - name: Suite completa (Postgres + Redis arriba)
        # timeout por test (thread, cross-async): un cuelgue falla con el traceback del culpable en vez
        # de agotar el job. --durations expone los más lentos. -ra resume saltados/fallos.
        run: uv run pytest -ra --timeout=180 --timeout-method=thread --durations=15
